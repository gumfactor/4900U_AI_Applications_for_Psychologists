{% extends "base.html" %}
{% block content %}
<section class="page-header">
    <div><p class="eyebrow">AI Log</p><h2>{{ log_entry.task }}</h2></div>
    <div class="page-header-actions">
        {% if note_href_for_log(log_entry) %}
        <a href="{{ note_href_for_log(log_entry) }}" class="ghost-link">Open affected note</a>
        {% endif %}
    </div>
</section>
<article class="panel prose-block"><pre>{{ log_entry.raw_content }}</pre></article>
{% endblock %}
