{% extends "base.html" %}
{% block content %}
<section class="page-header">
    <div><p class="eyebrow">Source Browser</p><h2>Sources</h2></div>
</section>
<section class="grid two-up">
    {% for source in sources %}
    <article class="panel">
        <h3><a href="/sources/{{ source.slug }}">{{ source.title }}</a></h3>
        <p>{{ source.content[:220] }}{% if source.content|length > 220 %}...{% endif %}</p>
    </article>
    {% endfor %}
</section>
{% endblock %}
