{% extends "base.html" %}
{% block content %}
<section class="page-header">
    <div>
        <p class="eyebrow">Edit Note</p>
        <h2>{{ note.metadata.title }}</h2>
    </div>
    <div class="page-header-actions">
        <a href="/notes/{{ note.slug }}?return_to={{ return_to | urlencode }}" class="ghost-link">Back To Note</a>
        <a href="{{ return_to }}" class="ghost-link">Back To Notes</a>
        <button type="button" class="ghost-link danger-button" id="delete-note-button">Delete</button>
    </div>
</section>
<section class="panel">
    <form id="edit-note-form" class="note-form">
        <label>Title
            <input name="title" type="text" value="{{ note.metadata.title }}" required>
        </label>
        <label>Topics
            <input name="topics" type="text" value="{{ note.metadata.topics | join(', ') }}">
        </label>
        <label>People
            <input name="people" type="text" value="{{ note.metadata.people | join(', ') }}">
        </label>
        <label>Sources
            <input name="sources" type="text" value="{{ note.metadata.sources | join(', ') }}">
        </label>
        <label>Projects
            <input name="projects" type="text" value="{{ note.metadata.projects | join(', ') }}">
        </label>
        <label>Due Date
            <input name="due_date" type="date" value="{{ note.metadata.due_date or '' }}">
        </label>
        <label>Status
            <select name="status">
                <option value="open"{% if note.metadata.status == "open" %} selected{% endif %}>Open</option>
                <option value="in-progress"{% if note.metadata.status == "in-progress" %} selected{% endif %}>In Progress</option>
                <option value="done"{% if note.metadata.status == "done" %} selected{% endif %}>Done</option>
            </select>
        </label>
        <label>Tags
            <input name="tags" type="text" value="{{ note.metadata.tags | join(', ') }}">
        </label>
        <label>Source References
            <input name="source_refs" type="text" value="{{ note.metadata.source_refs | join(', ') }}">
        </label>
        <label>Attachment References
            <input name="attachments" type="text" value="{{ note.metadata.attachments | join(', ') }}">
        </label>
        <label>Add Attachments
            <input name="files" type="file" multiple>
        </label>
        <label>Main Body
            <textarea name="content" rows="20" required>{{ note.raw_body }}</textarea>
        </label>
        <div class="note-panel-actions">
            <button type="submit" class="inline-button">Save Changes</button>
        </div>
        <p id="edit-note-feedback" class="muted-text"></p>
    </form>
</section>
<script>
const editNoteForm = document.getElementById("edit-note-form");
const editNoteFeedback = document.getElementById("edit-note-feedback");
const deleteNoteButton = document.getElementById("delete-note-button");

function splitCsv(value) {
  return (value || "").split(",").map((x) => x.trim()).filter(Boolean);
}

async function readAttachments(fileInput) {
  const files = Array.from(fileInput?.files || []);
  return Promise.all(files.map((file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve({
      name: file.name,
      content_base64: String(reader.result).split(",").pop()
    });
    reader.onerror = () => reject(reader.error || new Error("Could not read attachment."));
    reader.readAsDataURL(file);
  })));
}

editNoteForm?.addEventListener("submit", async (event) => {
  event.preventDefault();
  const formData = new FormData(editNoteForm);
  const payload = {
    title: formData.get("title"),
    topics: splitCsv(formData.get("topics")),
    people: splitCsv(formData.get("people")),
    sources: splitCsv(formData.get("sources")),
    projects: splitCsv(formData.get("projects")),
    due_date: formData.get("due_date") || null,
    status: formData.get("status") || "open",
    tags: splitCsv(formData.get("tags")),
    source_refs: splitCsv(formData.get("source_refs")),
    attachments: splitCsv(formData.get("attachments")),
    attachment_uploads: await readAttachments(editNoteForm.querySelector('input[name="files"]')),
    content: formData.get("content") || ""
  };
  const response = await fetch("/api/notes/{{ note.slug }}", {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });
  const data = await response.json();
  if (!response.ok) {
    editNoteFeedback.textContent = data.detail || "Could not update note.";
    return;
  }
  window.location.href = `/notes/${data.slug}`;
});

deleteNoteButton?.addEventListener("click", async () => {
  if (!window.confirm("Delete this note, its attachments, and its version history?")) {
    return;
  }
  deleteNoteButton.disabled = true;
  const response = await fetch("/api/notes/{{ note.slug }}", {method: "DELETE"});
  const data = await response.json();
  if (!response.ok) {
    editNoteFeedback.textContent = data.detail || "Could not delete note.";
    deleteNoteButton.disabled = false;
    return;
  }
  window.location.href = "{{ return_to }}";
});
</script>
{% endblock %}
