{% extends "base.html" %}
{% block content %}
<section class="page-header">
    <div><p class="eyebrow">Reproducibility</p><h2>AI Logs</h2></div>
</section>
<section class="grid two-up">
    {% for log in logs %}
    <article class="panel">
        <h3><a href="/logs/{{ log.slug }}">{{ log.task }}</a></h3>
        <p>{{ log.timestamp }}</p>
        <p>Model: {{ log.model }}</p>
        <p>Review: {{ log.review_outcome }}</p>
    </article>
    {% endfor %}
</section>
{% endblock %}
