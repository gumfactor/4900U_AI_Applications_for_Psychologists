<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Instructor PKB Demo" }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="note-overlay" class="note-overlay hidden"></div>
    <aside id="new-note-panel" class="note-panel hidden" aria-hidden="true">
        <div class="note-panel-header">
            <div>
                <p class="eyebrow">Quick Capture</p>
                <h2>Create A New Note</h2>
            </div>
            <button id="close-note-panel" class="ghost-button" type="button">Close</button>
        </div>
        <form id="new-note-form" class="note-form">
            <label>Title
                <input name="title" type="text" required>
            </label>
            <label>Note Kind
                <select name="note_kind">
                    <option value="" selected>Select note kind (optional)</option>
                    <option value="synthesis">synthesis</option>
                    <option value="reflection">reflection</option>
                    <option value="method-note">method-note</option>
                    <option value="brainstorming">brainstorming</option>
                </select>
            </label>
            <label>Topics
                <input name="topics" type="text" placeholder="Comma separated topics">
            </label>
            <label>People
                <input name="people" type="text" placeholder="Comma separated people">
            </label>
            <label>Sources
                <input name="sources" type="text" placeholder="Comma separated source labels">
            </label>
            <label>Projects
                <input name="projects" type="text" placeholder="Comma separated projects">
            </label>
            <label>Tags
                <input name="tags" type="text" placeholder="Comma separated tags">
            </label>
            <label>Source References
                <input name="source_refs" type="text" placeholder="Comma separated source refs">
            </label>
            <label>Main Body
                <textarea name="content" rows="14" required placeholder="Write the note body here. If you paste unstructured text, the app will wrap it into the standard note sections."></textarea>
            </label>
            <label class="inline-checkbox">
                <input name="ai_assisted" type="checkbox">
                Mark as AI-assisted
            </label>
            <div class="note-panel-actions">
                <button type="submit">Save Note</button>
            </div>
        </form>
        <p id="new-note-feedback" class="muted-text"></p>
    </aside>
    <header class="site-header">
        <div>
            <p class="eyebrow">Instructor Demo</p>
            <h1><a href="/notes">AI-Assisted Personal Knowledge Base</a></h1>
        </div>
        <nav>
            <a href="/notes">Notes</a>
            <a href="/stats">Stats</a>
            <a href="/sources">Sources</a>
            <a href="/ai">AI Tasks</a>
            <a href="/logs">Logs</a>
            <button id="open-note-panel" class="nav-button" type="button">New Note</button>
        </nav>
    </header>
    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>
    <script>
    const notePanel = document.getElementById("new-note-panel");
    const noteOverlay = document.getElementById("note-overlay");
    const openNotePanel = document.getElementById("open-note-panel");
    const closeNotePanel = document.getElementById("close-note-panel");
    const newNoteForm = document.getElementById("new-note-form");
    const newNoteFeedback = document.getElementById("new-note-feedback");

    function setNotePanelOpen(isOpen) {
        notePanel?.classList.toggle("hidden", !isOpen);
        noteOverlay?.classList.toggle("hidden", !isOpen);
        notePanel?.setAttribute("aria-hidden", String(!isOpen));
    }

    openNotePanel?.addEventListener("click", () => setNotePanelOpen(true));
    closeNotePanel?.addEventListener("click", () => setNotePanelOpen(false));
    noteOverlay?.addEventListener("click", () => setNotePanelOpen(false));

    newNoteForm?.addEventListener("submit", async (event) => {
        event.preventDefault();
        const formData = new FormData(newNoteForm);
        const payload = {
            title: formData.get("title"),
            note_kind: formData.get("note_kind"),
            topics: (formData.get("topics") || "").split(",").map((x) => x.trim()).filter(Boolean),
            people: (formData.get("people") || "").split(",").map((x) => x.trim()).filter(Boolean),
            sources: (formData.get("sources") || "").split(",").map((x) => x.trim()).filter(Boolean),
            projects: (formData.get("projects") || "").split(",").map((x) => x.trim()).filter(Boolean),
            tags: (formData.get("tags") || "").split(",").map((x) => x.trim()).filter(Boolean),
            source_refs: (formData.get("source_refs") || "").split(",").map((x) => x.trim()).filter(Boolean),
            content: formData.get("content") || "",
            ai_assisted: formData.get("ai_assisted") === "on"
        };
        const response = await fetch("/api/notes/save-draft", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (!response.ok) {
            newNoteFeedback.textContent = data.detail || "Could not save note.";
            return;
        }
        window.location.href = `/notes/${data.slug}`;
    });
    </script>
</body>
</html>
